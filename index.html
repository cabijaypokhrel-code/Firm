    <style>
        :root {
            /* Light Theme Variables */
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-surface: rgba(255, 255, 255, 0.75);
            --bg-footer: #0b132b;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --primary: #0a2540;
            --primary-light: #635bff;
            --secondary: #d4af37; /* Metallic Corporate Gold */
            --secondary-hover: #b8962e;
            --accent-blue: #00d4ff;
            --border-color: rgba(15, 23, 42, 0.08);
            --glass-border: rgba(255, 255, 255, 0.6);
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 40px -15px rgba(0,0,0,0.08);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            /* Dark Theme Variables */
            --bg-primary: #030712;
            --bg-secondary: #0b0f19;
            --bg-surface: rgba(11, 15, 25, 0.7);
            --bg-footer: #020617;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --primary: #635bff;
            --primary-light: #8079ff;
            --secondary: #f59e0b;
            --secondary-hover: #d97706;
            --accent-blue: #38bdf8;
            --border-color: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.03);
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.2);
            --shadow-md: 0 10px 25px -5px rgba(0,0,0,0.3);
            --shadow-lg: 0 20px 40px -15px rgba(0,0,0,0.5);
        }

        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Manrope', sans-serif;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        ul {
            list-style: none;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* Utility Components */
        .container {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.875rem 1.75rem;
            font-weight: 600;
            border-radius: 6px;
            transition: var(--transition);
            cursor: pointer;
            font-size: 0.95rem;
            gap: 0.5rem;
            border: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(99, 91, 255, 0.25);
        }

        [data-theme="light"] .btn-primary {
            background-color: #0a2540;
            box-shadow: 0 4px 14px rgba(10, 37, 64, 0.15);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 91, 255, 0.35);
            opacity: 0.95;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--bg-secondary);
            border-color: var(--text-muted);
            transform: translateY(-2px);
        }

        .btn-gold {
            background-color: var(--secondary);
            color: #000000;
            font-weight: 700;
        }

        .btn-gold:hover {
            background-color: var(--secondary-hover);
            transform: translateY(-2px);
        }

        .badge {
            display: inline-block;
            padding: 0.35rem 0.85rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 50px;
            background: rgba(212, 175, 55, 0.15);
            color: var(--secondary);
            border: 1px solid rgba(212, 175, 55, 0.25);
            margin-bottom: 1.25rem;
        }

        .section-title-wrapper {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 4.5rem auto;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-desc {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Glassmorphism utility */
        .glass-card {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
        }

        /* Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
        }

        [data-theme="dark"] .navbar {
            background: rgba(11, 15, 25, 0.75);
        }

        .navbar.scrolled {
            padding: 0.5rem 0;
            box-shadow: var(--shadow-lg);
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
            transition: var(--transition);
        }

        .navbar.scrolled .nav-container {
            height: 65px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.4rem;
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
            color: var(--text-primary);
        }

        .logo-emblem {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0a2540 0%, var(--secondary) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .logo-text span {
            color: var(--secondary);
            font-weight: 400;
            font-size: 0.85rem;
            display: block;
            margin-top: -4px;
            letter-spacing: 0.1em;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 2.25rem;
        }

        .nav-link {
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-secondary);
            position: relative;
            padding: 0.5rem 0;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-primary);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--secondary);
            transition: var(--transition);
        }

        .nav-link:hover::after, .nav-link.active::after {
            width: 100%;
        }

        /* Mega Menu Core styling */
        .has-megamenu {
            position: static;
        }

        .megamenu {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: var(--bg-secondary);
            border-bottom: 3px solid var(--secondary);
            box-shadow: var(--shadow-lg);
            padding: 3rem 0;
            opacity: 0;
            visibility: hidden;
            transform: translateY(15px);
            transition: var(--transition);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            z-index: 999;
        }

        .has-megamenu:hover .megamenu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .megamenu-column h4 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--secondary);
            margin-bottom: 1.25rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .megamenu-column ul li {
            margin-bottom: 0.75rem;
        }

        .megamenu-column ul a {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .megamenu-column ul a:hover {
            color: var(--text-primary);
            padding-left: 5px;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            border: 1px solid var(--border-color);
        }

        .theme-toggle:hover {
            color: var(--text-primary);
            background-color: var(--border-color);
        }

        .search-trigger {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.1rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .search-trigger:hover {
            color: var(--text-primary);
            background-color: var(--border-color);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0.5rem;
        }

        .hamburger span {
            display: block;
            width: 26px;
            height: 2px;
            background-color: var(--text-primary);
            transition: var(--transition);
        }

        /* Search Overlay Overlay */
        .search-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 7, 18, 0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .search-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 600px;
            padding: 0 1.5rem;
        }

        .search-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            padding: 1rem 0;
            font-size: 1.5rem;
            color: #fff;
            font-family: 'Manrope', sans-serif;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--secondary);
        }

        .search-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            position: relative;
            padding: 11rem 0 7rem 0;
            background-color: var(--bg-primary);
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(99,91,255,0.08) 0%, transparent 70%);
            z-index: 0;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(212,175,55,0.06) 0%, transparent 70%);
            z-index: 0;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 4rem;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-content h1 {
            font-size: 3.75rem;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .hero-content h1 span {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            font-size: 1.15rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            max-width: 560px;
        }

        .hero-actions {
            display: flex;
            gap: 1.25rem;
            margin-bottom: 3.5rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            border-top: 1px solid var(--border-color);
            padding-top: 2rem;
        }

        .stat-item h3 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
            font-family: 'Poppins', sans-serif;
        }

        .stat-item h3 span {
            color: var(--secondary);
        }

        .stat-item p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        /* Hero Graphic Stack */
        .hero-graphic {
            position: relative;
        }

        .main-img-wrapper {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            transform: perspective(1000px) rotateY(-8deg) rotateX(4deg);
            transition: var(--transition);
        }

        .main-img-wrapper:hover {
            transform: perspective(1000px) rotateY(0deg) rotateX(0deg);
        }

        .hero-floating-card {
            position: absolute;
            bottom: 2rem;
            left: -2rem;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            max-width: 260px;
        }

        .card-icon-box {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(99, 91, 255, 0.15);
            color: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .card-info h4 {
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .card-info p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* About Section */
        .about {
            padding: 7rem 0;
            background-color: var(--bg-secondary);
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4.5rem;
            align-items: center;
        }

        .about-left {
            position: relative;
        }

        .about-img-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1rem;
        }

        .about-img-1 {
            grid-column: 1 / span 8;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
        }

        .about-img-2 {
            grid-column: 5 / -1;
            margin-top: -50px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            border: 4px solid var(--bg-secondary);
        }

        .about-right h2 {
            font-size: 2.25rem;
            margin-bottom: 1.5rem;
        }

        .about-lead {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        /* Pillar Tabs / Content blocks */
        .pillars-stack {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .pillar-card {
            padding: 1.25rem;
            border-left: 3px solid var(--border-color);
            transition: var(--transition);
        }

        .pillar-card:hover, .pillar-card.active {
            border-left-color: var(--secondary);
            background: var(--bg-primary);
        }

        .pillar-card h4 {
            font-size: 1.1rem;
            margin-bottom: 0.35rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .pillar-card h4 i {
            color: var(--secondary);
        }

        .pillar-card p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            padding-left: 1.75rem;
        }

        /* Services Grid Section */
        .services {
            padding: 7rem 0;
            background-color: var(--bg-primary);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .service-card {
            padding: 2.5rem;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(99,91,255,0.03) 0%, transparent 100%);
            opacity: 0;
            transition: var(--transition);
        }

        .service-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .service-card:hover::before {
            opacity: 1;
        }

        .service-icon {
            width: 56px;
            height: 56px;
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.04);
            color: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1.75rem;
            transition: var(--transition);
        }

        [data-theme="dark"] .service-icon {
            background: rgba(255, 255, 255, 0.04);
        }

        .service-card:hover .service-icon {
            background: var(--primary);
            color: #ffffff;
        }

        .service-card h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .service-card p {
            color: var(--text-secondary);
            font-size: 0.925rem;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .service-link {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .service-link i {
            font-size: 0.8rem;
            transition: var(--transition);
        }

        .service-card:hover .service-link i {
            transform: translateX(5px);
            color: var(--secondary);
        }

        /* Why Choose Us Section */
        .why-choose {
            padding: 7rem 0;
            background-color: var(--bg-secondary);
        }

        .why-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4rem;
            align-items: center;
        }

        .why-feat-list {
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
        }

        .why-feat-item {
            display: flex;
            gap: 1.25rem;
        }

        .why-feat-icon {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(212,175,55,0.12);
